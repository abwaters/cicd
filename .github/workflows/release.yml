name: Release

on:
  push:
    branches: [main]

# Allow one release at a time; never cancel an in-flight publish.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # create the GitHub Release + git tag
  issues: write # semantic-release comments on released issues
  pull-requests: write # semantic-release comments on released PRs
  id-token: write # npm provenance + future OIDC Trusted Publishing
  packages: write # publish to GitHub Packages

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history + tags for version analysis
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22" # semantic-release requires Node >= 22.14

      - name: Upgrade npm
        # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.x.
        run: npm install -g npm@latest

      - name: Configure GitHub Packages auth
        # Public npm authenticates via OIDC Trusted Publishing (no token — see the
        # `id-token: write` permission above). GitHub Packages still needs a token.
        run: echo "//npm.pkg.github.com/:_authToken=\${GITHUB_TOKEN}" > .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
